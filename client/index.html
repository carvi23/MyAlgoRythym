<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAlgoRythym</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <span class="my">My</span><span class="algo">Algo</span><span class="rythm">Rythm</span>
        </div>
        <div class="header-right">
            <button onclick="goToLogin()" class="login-btn">로그인</button>
        </div>
    </header>

    <main class="landing">
        <div class="hero">
            <h1>나의 알고리즘 분석</h1>
            <p class="subtitle">YouTube · Twitch · Instagram · TikTok<br>당신의 추천 알고리즘을 투명하게 분석하고 개선하세요</p>
            
            <div class="input-section">
                <div class="tabs">
                    <button onclick="switchTab(0)" class="tab active" id="tab-0">링크로 빠른 건강도 체크</button>
                    <button onclick="switchTab(1)" class="tab" id="tab-1">기록 파일 업로드</button>
                    <button onclick="switchTab(2)" class="tab" id="tab-2">확장 프로그램 연결</button>
                </div>

                <div id="panel-0" class="panel active">
                    <div class="link-input-wrapper">
                        <input type="text" id="link-input" placeholder="https://youtube.com/@yourchannel 또는 Twitch·Instagram·TikTok 프로필 링크">
                        <button onclick="analyzeLink()" class="analyze-btn">빠른 건강도 체크</button>
                    </div>
                    <div class="personal-notice">
                        <strong>⚡ 빠른 건강도 체크 (Lite)</strong><br>
                        <span>프로필 링크 하나로 공개 활동 기반 편향도를 30초 만에 확인합니다.</span>
                    </div>
                </div>

                <div id="panel-1" class="panel">
                    <div class="upload-area" onclick="document.getElementById('file-input').click()">
                        <input type="file" id="file-input" accept=".json,.csv,.txt,.zip" style="display:none" onchange="handleFileUpload(event)">
                        <div class="upload-content">
                            <span class="upload-icon">📤</span>
                            <p>Takeout 또는 기록 파일을 드래그하거나 클릭하세요</p>
                            <small>YouTube Takeout, Twitch CSV, Instagram·TikTok 데이터 파일 지원</small>
                        </div>
                    </div>
                </div>

                <div id="panel-2" class="panel">
                    <div class="extension-connect">
                        <button onclick="connectExtension()" class="connect-btn">🔌 확장 프로그램 연결하기</button>
                        <a href="extension.zip" download class="download-link">확장 프로그램 다운로드 (.zip)</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="history-section">
            <h2>최근 분석 기록</h2>
            <div id="history-list" class="history-list"></div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
