<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 결과 - MyAlgoRythym</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <span class="my">My</span><span class="algo">Algo</span><span class="rythm">Rythm</span>
        </div>
        <div class="header-right">
            <button onclick="goBack()" class="back-btn">← 처음으로</button>
            <button onclick="goToLogin()" class="login-btn">로그인</button>
        </div>
    </header>

    <main class="result-page">
        <div id="platform-badge" class="platform-badge"></div>
        
        <!-- Lite 배지 -->
        <div id="lite-banner" class="lite-banner"></div>

        <!-- 상단 요약 -->
        <div id="top-summary" class="top-summary"></div>

        <!-- 원형 3개 -->
        <div class="circles-container">
            <div class="circle-card">
                <div id="circle-content" class="circle red-circle"></div>
                <p class="circle-label">콘텐츠 성향</p>
            </div>
            <div class="circle-card">
                <div id="circle-interest" class="circle yellow-circle"></div>
                <p class="circle-label">관심사/장르 편향</p>
            </div>
            <div class="circle-card">
                <div id="circle-influence" class="circle blue-circle"></div>
                <p class="circle-label">추천 영향도</p>
            </div>
        </div>

        <!-- 아래 3개 결과 박스 -->
        <div class="results-grid">
            <div class="result-box">
                <h3>🔍 핵심 요약</h3>
                <div id="core-summary" class="box-content"></div>
            </div>

            <div class="result-box">
                <h3>🚀 추천 행동</h3>
                <div id="recommended-actions" class="box-content"></div>
            </div>

            <div class="result-box">
                <h3>📊 분석 신호</h3>
                <div id="analysis-signals" class="box-content"></div>
            </div>
        </div>

        <!-- 프리미엄 -->
        <div class="premium-section">
            <button onclick="goToPremium()" class="premium-btn">
                ⭐ 프리미엄으로 더 깊이 분석하기 (상세 시청 패턴 · 예측 시뮬레이션)
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
